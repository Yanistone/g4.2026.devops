# TP2 — Pipeline CI/CD. Fichier À TROUS : complète les TODO.
# Cible obligatoire : lint → test → build (push: false).
# Bonus : push GHCR + deploy simulé (voir solutions/ci.yml).

name: CI/CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----- BONUS (voir solutions/ci.yml) -----
  # Étape 4 : push de l'image vers ghcr.io (permissions: packages: write + docker/login-action)
  # Étape 5 : deploy simulé (environment: production + echo)
